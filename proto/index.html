<style>
  :root{
    --bg:#0b0d10; --panel:#12161d; --panel-2:#161b23; --panel-3:#1a212b;
    --border:#232b37; --border-soft:#1b222c;
    --fg:#e8ecf1; --fg-dim:#98a2b0; --fg-mute:#5f6a78;
    --accent:#33c9a3; --accent-2:#2bb593; --accent-soft:rgba(51,201,163,0.12); --accent-line:rgba(51,201,163,0.30);
    --amber:#d6a14e; --amber-soft:rgba(214,161,78,0.12);
    --red:#d8696b; --red-soft:rgba(216,105,107,0.12);
    --blue:#7d93c9; --violet:#9a86c4; --slate:#6c7787;
    --shadow:0 1px 0 rgba(255,255,255,0.02) inset, 0 8px 24px -16px rgba(0,0,0,0.6);
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --sans:'Hanken Grotesk',system-ui,-apple-system,Segoe UI,sans-serif;
    --side-w:236px; --side-w-collapsed:62px; --top-h:57px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;line-height:1.45;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
  .right{text-align:right}.dim{color:var(--fg-dim)}.mute{color:var(--fg-mute)}

  /* ============================ app shell ============================ */
  .app{display:flex;height:100vh;width:100vw;position:relative}
  .app::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(1200px 600px at 80% -10%, rgba(51,201,163,0.05), transparent 60%),
               radial-gradient(900px 500px at 0% 0%, rgba(125,147,201,0.04), transparent 55%);}

  /* ---------- sidebar ---------- */
  aside.side{width:var(--side-w);flex:0 0 auto;background:#0e1218;border-right:1px solid var(--border);
    display:flex;flex-direction:column;z-index:3;transition:width .18s ease;position:relative}
  body.collapsed aside.side{width:var(--side-w-collapsed)}
  .side .brand{display:flex;align-items:center;gap:11px;padding:16px 16px 15px;border-bottom:1px solid var(--border-soft);
    min-height:var(--top-h)}
  .side .mark{width:30px;height:30px;border-radius:8px;flex:0 0 auto;position:relative;
    background:linear-gradient(150deg,#1c2530,#12161d);border:1px solid var(--border);display:grid;place-items:center}
  .side .mark::after{content:"";width:11px;height:11px;border-radius:3px;transform:rotate(45deg);
    background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .side .bname{font-size:13.5px;font-weight:600;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden}
  .side .bname b{color:var(--accent);font-weight:700}
  .side .bname .s{display:block;font-size:10px;color:var(--fg-mute);font-weight:500;letter-spacing:.04em;margin-top:1px}
  body.collapsed .side .bname{opacity:0;width:0}

  nav.menu{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
  nav .grp{font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-mute);
    padding:14px 10px 6px;white-space:nowrap;overflow:hidden}
  body.collapsed nav .grp{opacity:0;height:8px;padding:4px 0}
  nav a{display:flex;align-items:center;gap:12px;padding:9px 11px;border-radius:9px;color:var(--fg-dim);
    text-decoration:none;font-size:13px;font-weight:500;white-space:nowrap;position:relative;transition:.12s}
  nav a svg{width:18px;height:18px;flex:0 0 auto;stroke:currentColor;fill:none;stroke-width:1.7;
    stroke-linecap:round;stroke-linejoin:round;opacity:.85}
  nav a .lbl{overflow:hidden}
  body.collapsed nav a .lbl{opacity:0;width:0}
  body.collapsed nav a{justify-content:center;padding:9px}
  nav a:hover{background:var(--panel-2);color:var(--fg)}
  nav a.on{background:var(--accent-soft);color:var(--fg)}
  nav a.on svg{opacity:1;color:var(--accent)}
  nav a.on::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
  nav a .stub{margin-left:auto;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-mute);
    border:1px solid var(--border);border-radius:4px;padding:1px 5px}
  body.collapsed nav a .stub{display:none}
  nav a .mo{margin-left:auto;font-size:9px;font-family:var(--mono);color:var(--accent);opacity:.7}
  body.collapsed nav a .mo{display:none}

  .side .foot{border-top:1px solid var(--border-soft);padding:12px 16px;font-size:10.5px;color:var(--fg-mute);
    white-space:nowrap;overflow:hidden}
  .side .foot .t{font-family:var(--mono);color:var(--fg-dim);font-size:11px}
  body.collapsed .side .foot{opacity:0}
  .collapse{position:absolute;top:18px;right:-12px;width:24px;height:24px;border-radius:7px;z-index:5;
    background:var(--panel-2);border:1px solid var(--border);color:var(--fg-mute);cursor:pointer;
    display:grid;place-items:center;transition:.15s;box-shadow:var(--shadow)}
  .collapse:hover{color:var(--fg);border-color:var(--accent-line)}
  .collapse svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .18s}
  body.collapsed .collapse svg{transform:rotate(180deg)}

  /* ---------- main column ---------- */
  .mainwrap{flex:1;display:flex;flex-direction:column;min-width:0;z-index:1}
  header.top{height:var(--top-h);flex:0 0 auto;display:flex;align-items:center;gap:20px;
    padding:0 26px;border-bottom:1px solid var(--border);background:rgba(11,13,16,0.7);backdrop-filter:blur(8px)}
  header .pg-title{font-size:15px;font-weight:600;letter-spacing:-0.01em}
  header .pg-title .crumb{color:var(--fg-mute);font-weight:500;font-size:13px;margin-right:8px}
  header .spacer{flex:1}
  .seg{display:flex;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:2px}
  .seg button{background:none;border:none;color:var(--fg-mute);font-family:var(--sans);font-size:11.5px;font-weight:500;
    padding:5px 11px;border-radius:6px;cursor:pointer;transition:.12s;white-space:nowrap}
  .seg button:hover{color:var(--fg-dim)}
  .seg button.on{background:var(--panel-3);color:var(--fg);box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .seg.fleet button.on[data-fleet="mu"]{color:var(--accent)}
  .seg.fleet button.on[data-fleet="cc"]{color:var(--amber)}
  .fl-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-mute);margin-right:-8px}
  .pill{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--fg-dim);background:var(--panel-2);
    border:1px solid var(--border);border-radius:8px;padding:6px 11px;font-family:var(--mono)}
  .pill svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7;opacity:.7}
  .live{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.03em}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--accent);position:relative}
  .pulse::after{content:"";position:absolute;inset:-4px;border-radius:50%;background:var(--accent);opacity:.5;animation:pulse 2s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.6);opacity:.5}100%{transform:scale(2.4);opacity:0}}

  main#view{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 26px 70px;position:relative}
  .page{max-width:1480px;margin:0 auto;animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}
  .page-head h2{font-size:17px;font-weight:600;margin:0;letter-spacing:-0.015em}
  .page-head .lede{font-size:12.5px;color:var(--fg-mute);margin-top:3px;max-width:680px}
  .scope-tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;font-family:var(--mono);
    padding:4px 9px;border-radius:6px;white-space:nowrap;border:1px solid}
  .scope-tag.mu{color:var(--accent);background:var(--accent-soft);border-color:var(--accent-line)}
  .scope-tag.both{color:var(--blue);background:rgba(125,147,201,0.1);border-color:rgba(125,147,201,0.25)}

  /* ---------- shared components (same DNA as index.html) ---------- */
  .recon{display:flex;align-items:center;gap:0;flex-wrap:wrap;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:13px 6px;margin-bottom:16px;box-shadow:var(--shadow)}
  .recon .cell{display:flex;flex-direction:column;gap:2px;padding:2px 20px;flex:1;min-width:150px}
  .recon .cell + .cell{border-left:1px solid var(--border)}
  .recon .k{font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--fg-mute);display:flex;align-items:center;gap:7px}
  .recon .v{font-family:var(--mono);font-size:19px;font-weight:600;letter-spacing:-0.02em}
  .recon .v small{font-size:12px;color:var(--fg-mute);font-weight:400}
  .dot{width:8px;height:8px;border-radius:2px;flex:0 0 auto}
  .dot.solid{background:var(--accent)}.dot.ring{background:transparent;border:1.5px dashed var(--slate)}.dot.free{background:var(--fg-mute);opacity:.5}

  .kpis{display:grid;gap:14px;margin-bottom:22px}
  .kpis.k4{grid-template-columns:1.15fr 1.15fr .85fr .85fr}
  .kpis.k3{grid-template-columns:1fr 1fr 1fr}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:17px 18px 16px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
  .kpi .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
  .kpi .name{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--fg-dim)}
  .kpi .tag{font-size:9.5px;letter-spacing:0.08em;text-transform:uppercase;font-weight:700;padding:3px 7px;border-radius:5px;line-height:1;background:var(--panel-3);color:var(--fg-mute)}
  .kpi .big{font-family:var(--mono);font-weight:700;letter-spacing:-0.03em;line-height:1;font-size:34px;display:flex;align-items:baseline;gap:4px}
  .kpi .big .cur{font-size:20px;font-weight:600;opacity:.7}
  .kpi .meta{margin-top:12px;font-size:12px;color:var(--fg-dim);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .kpi .meta .b{font-family:var(--mono);color:var(--fg);font-weight:500}
  .kpi .bar{height:4px;border-radius:3px;background:var(--panel-3);margin-top:13px;overflow:hidden}
  .kpi .bar i{display:block;height:100%;border-radius:3px;background:var(--accent)}
  .kpi.billed{border-color:rgba(51,201,163,0.4)}
  .kpi.billed::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
  .kpi.billed .name,.kpi.billed .big{color:var(--accent)}
  .kpi.billed .tag{background:var(--accent-soft);color:var(--accent)}
  .kpi.subs{background:repeating-linear-gradient(135deg,var(--panel),var(--panel) 9px,var(--panel-2) 9px,var(--panel-2) 10px);border-style:dashed}
  .kpi.subs .big{color:var(--fg-dim)}.kpi.subs .name{color:var(--blue)}.kpi.subs .tag{background:rgba(125,147,201,0.12);color:var(--blue)}.kpi.subs .bar i{background:var(--slate);opacity:.6}
  .kpi.accent .big{color:var(--accent)}.kpi.warn .big{color:var(--amber)}.kpi.warn .bar i{background:var(--amber)}

  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:17px 18px 16px;box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:0}
  .col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-5{grid-column:span 5}.col-6{grid-column:span 6}.col-7{grid-column:span 7}.col-8{grid-column:span 8}.col-12{grid-column:span 12}
  .span-row{margin-top:0}
  .ph{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
  .ph .ttl{font-size:13px;font-weight:600;letter-spacing:-0.005em}
  .ph .desc{font-size:11.5px;color:var(--fg-mute);margin-top:2px;max-width:92%}
  .ph .hint{font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-mute);font-family:var(--mono);white-space:nowrap}
  .chart{width:100%;min-height:0}
  .legend{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:10px}
  .legend .it{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--fg-dim)}
  .legend .sw{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
  .legend .it b{font-family:var(--mono);color:var(--fg);font-weight:500;margin-left:auto}

  .obars{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .obar .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:5px}
  .obar .nm{font-size:12.5px;display:flex;align-items:center;gap:8px}
  .obar .nm .sw{width:9px;height:9px;border-radius:2px}
  .obar .ct{font-family:var(--mono);font-size:12px;color:var(--fg-dim)}
  .obar .ct b{color:var(--fg);font-weight:600}
  .obar .track{height:7px;border-radius:4px;background:var(--panel-3);overflow:hidden}
  .obar .track i{display:block;height:100%;border-radius:4px}

  .caveat{background:var(--amber-soft);border:1px solid rgba(214,161,78,0.3);border-radius:11px;padding:13px 14px;display:flex;gap:11px;align-items:flex-start}
  .caveat.thin{background:rgba(125,147,201,0.07);border-color:rgba(125,147,201,0.25)}
  .caveat .ic{width:20px;height:20px;border-radius:6px;flex:0 0 auto;display:grid;place-items:center;background:rgba(214,161,78,0.18);color:var(--amber);font-weight:700;font-size:13px;font-family:var(--mono);margin-top:1px}
  .caveat.thin .ic{background:rgba(125,147,201,0.16);color:var(--blue)}
  .caveat .body{font-size:12px;line-height:1.5;color:var(--fg-dim)}
  .caveat .body b{color:var(--amber);font-weight:600}
  .caveat.thin .body b{color:var(--blue)}

  /* table */
  .tbl-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--fg-dim);cursor:pointer;user-select:none}
  .toggle .sw2{width:34px;height:19px;border-radius:11px;background:var(--panel-3);position:relative;border:1px solid var(--border);transition:.15s}
  .toggle .sw2::after{content:"";position:absolute;top:1.5px;left:1.5px;width:14px;height:14px;border-radius:50%;background:var(--fg-mute);transition:.15s}
  .toggle.on .sw2{background:var(--accent-soft);border-color:var(--accent-line)}
  .toggle.on .sw2::after{transform:translateX(15px);background:var(--accent)}
  table.sess{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
  table.sess thead th{text-align:left;font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-mute);font-weight:600;padding:0 12px 9px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
  table.sess thead th.r{text-align:right}
  table.sess thead th:hover{color:var(--fg-dim)}
  table.sess thead th .ar{opacity:.4;font-size:9px;margin-left:3px}
  table.sess thead th.act{color:var(--fg-dim)} table.sess thead th.act .ar{opacity:1;color:var(--accent)}
  table.sess tbody td{padding:11px 12px;border-bottom:1px solid var(--border-soft);vertical-align:middle}
  /* sessions: day breakout + filter bar */
  .fin{background:var(--panel-2);color:var(--fg);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-family:var(--mono);font-size:11px}
  .fin::placeholder{color:var(--fg-mute)}
  .day-grp{border:1px solid var(--border);border-radius:10px;margin-top:10px;overflow:hidden;background:var(--panel)}
  .day-hdr{display:flex;align-items:center;gap:11px;padding:10px 13px;cursor:pointer;user-select:none;transition:background .12s}
  .day-hdr:hover{background:var(--panel-2)}
  .day-grp.open .day-hdr{background:var(--panel-2);border-bottom:1px solid var(--border-soft)}
  .day-hdr .chev{transition:transform .15s} .day-grp.open .day-hdr .chev{transform:rotate(90deg);color:var(--accent)}
  .day-hdr .d{font-family:var(--mono);font-weight:600;font-size:13px}

/* ---- fleet scoping --------------------------------------------------------
   VIEW is the fleet-scoped contract the renderers + chart helpers read; route()
   sets it from STATE.fleet on every navigation/selector change. For 'both' it IS
   the raw DATA. For a single fleet we recompute the session-derived aggregates
   (KPIs, cost_by_kind, outcomes, trend_by_day, hallucination) from all_sessions
   — which carries fleet/kind/cost/outcome/model/tool_calls/started — and filter
   the already-fleet-keyed arrays. Methodology mirrors sample_data.build() so a
   single-fleet view matches what the server would emit for that fleet. */
let VIEW = DATA;
// Outcome classes that count as hallucinations; mirrors sample_data.HALLU.
const HALLU_OUTCOMES = new Set(['narrative_no_action', 'hollow_commit', 'lying_state']);

function scopedData(fleet){
  // 'both' (or anything unexpected) renders the raw server contract untouched.
  if(fleet !== 'mu' && fleet !== 'cc') return DATA;

  const round2 = n => +(+n || 0).toFixed(2);
  const round3 = n => +(+n || 0).toFixed(3);
  const usedTools = session => (+session.tool_calls || 0) > 0;
  const isHallucination = session => HALLU_OUTCOMES.has(session.outcome);

  // Per-session rows are the source we re-aggregate everything from. all_sessions
  // carries fleet / kind / cost / outcome / model / tool_calls / started.
  const allRows = (DATA.all_sessions && DATA.all_sessions.length) ? DATA.all_sessions : (DATA.top_sessions || []);
  const sessions = allRows.filter(session => session.fleet === fleet);
  const totalCost = round2(sessions.reduce((sum, session) => sum + (+session.cost || 0), 0));

  // Cost + session count grouped by billing kind (subscription / billed / free).
  const kindTotals = new Map();
  for(const session of sessions){
    const row = kindTotals.get(session.kind) || { label: session.kind, sessions: 0, cost: 0 };
    row.sessions += 1;
    row.cost += +session.cost || 0;
    kindTotals.set(session.kind, row);
  }
  const costByKind = [...kindTotals.values()]
    .map(row => ({ label: row.label, sessions: row.sessions, cost: round2(row.cost) }))
    .sort((a, b) => b.cost - a.cost);
  const costForKind = Object.fromEntries(costByKind.map(row => [row.label, row.cost]));

  // Cost + session count grouped by model (fleet is fixed to the selection).
  const modelTotals = new Map();
  for(const session of sessions){
    const row = modelTotals.get(session.model) || { fleet, model: session.model, sessions: 0, cost: 0 };
    row.sessions += 1;
    row.cost += +session.cost || 0;
    modelTotals.set(session.model, row);
  }
  const costByModel = [...modelTotals.values()]
    .map(row => ({ fleet, model: row.model, sessions: row.sessions, cost: round2(row.cost) }))
    .sort((a, b) => b.cost - a.cost)
    .slice(0, 8);

  // Session count grouped by outcome class.
  const outcomeCounts = new Map();
  for(const session of sessions){
    const outcome = session.outcome || 'unclassified';
    outcomeCounts.set(outcome, (outcomeCounts.get(outcome) || 0) + 1);
  }
  const outcomes = [...outcomeCounts.entries()]
    .map(([outcome, count]) => ({ outcome, sessions: count }))
    .sort((a, b) => b.sessions - a.sessions);

  // Hallucination rate per model = hallucination-outcomes / tool-using sessions.
  // Models with fewer than 3 tool-using sessions are dropped (small-N noise).
  const modelHallu = new Map();
  for(const session of sessions){
    if(!usedTools(session)) continue;
    const row = modelHallu.get(session.model) || { model: session.model, toolUsing: 0, hallucinated: 0 };
    row.toolUsing += 1;
    if(isHallucination(session)) row.hallucinated += 1;
    modelHallu.set(session.model, row);
  }
  const hallucinationByModel = [...modelHallu.values()]
    .filter(row => row.toolUsing >= 3)
    .map(row => ({ fleet, model: row.model, rate: round3(row.hallucinated / row.toolUsing), sessions: row.toolUsing }))
    .sort((a, b) => b.sessions - a.sessions)
    .slice(0, 10);

  // Daily trend: cost summed per day + a degradation rate (hallucination-outcomes
  // / tool-using sessions that day). Same {date, cost, degradation} shape the
  // server emits in trend_by_day.
  const dayTotals = new Map();
  for(const session of sessions){
    const day = session.started || '';
    if(!day) continue;
    const row = dayTotals.get(day) || { date: day, cost: 0, toolUsing: 0, hallucinated: 0 };
    row.cost += +session.cost || 0;
    if(usedTools(session)){
      row.toolUsing += 1;
      if(isHallucination(session)) row.hallucinated += 1;
    }
    dayTotals.set(day, row);
  }
  const trendByDay = [...dayTotals.values()]
    .sort((a, b) => a.date < b.date ? -1 : 1)
    .map(row => ({
      date: row.date,
      cost: round2(row.cost),
      degradation: row.toolUsing ? round3(row.hallucinated / row.toolUsing) : 0,
    }));

  const onlyThisFleet = rows => (rows || []).filter(row => row.fleet === fleet);

  // top_sessions deliberately stays global: the Cost page pairs it with
  // cost_composition_top_session (a per-token breakdown) that can't be recomputed
  // client-side, so scoping the label but not the donut would make them disagree.
  return {
    ...DATA,
    kpi: {
      total_api_rate_equiv: totalCost,
      by_kind: {
        subscription: costForKind.subscription || 0,
        billed: costForKind.billed || 0,
        free: costForKind.free || 0,
      },
    },
    cost_by_kind: costByKind,
    cost_by_fleet: [{ label: fleet, sessions: sessions.length, cost: totalCost }],
    cost_by_model: costByModel,
    outcomes,
    hallucination_by_model: hallucinationByModel,
    trend_by_day: trendByDay,
    all_sessions: sessions,
    flagged_queue: onlyThisFleet(DATA.flagged_queue),
    degradation_rate: fleet === 'mu' ? DATA.degradation_rate : 0,  // mu stop-reason signal; cc emits none
  };
}

function pageHead(title,lede,scope){

/* ---------- COST & CACHE ---------- */
function renderCost(v){
  // cache economics model — exponential think-gaps, real multipliers, opus rate
  const RATE=5.0, P=60000, ASKS=40;
  const baseRead = P*RATE/1e6*MULT.read; // $/ask cached read
  function sessCost(gap, ttl, writeMult){
    const f = gap<=0?0:Math.exp(-ttl/gap);             // P(gap>ttl) = expiry fraction
    const perAsk = (1-f)*baseRead + f*(P*RATE/1e6*writeMult);
    return ASKS*perAsk;
  }
  const gaps=[]; for(let g=1;g<=60;g++) gaps.push(g);
  const c5=gaps.map(g=>+sessCost(g,5,MULT.write_5m).toFixed(2));
  const c1h=gaps.map(g=>+sessCost(g,60,MULT.write_1h).toFixed(2));
  const ce=VIEW.cache_econ||{};
  const med=+(ce.median_gap_min||0), p90=+(ce.p90_gap_min||0), saveP90=+(ce.save_pct_p90||0);
  const w5=ce.w5_tokens||0, w1=ce.w1_tokens||0, oneHr=(w5+w1)?Math.round(w1/(w5+w1)*100):0;
  const exp5=ce.expired_5m_count||0, near5=ce.near_miss_4_6m_count||0, gapsN=ce.gap_count||0;
  const perAskAll=(VIEW.per_ask_sessions||[]).flatMap(s=>s.asks.map(a=>a.cost)).sort((a,b)=>a-b);
  const perAskMed=perAskAll.length?perAskAll[Math.floor(perAskAll.length/2)]:0;
  const co=VIEW.cost_composition_top_session||{}, ctot=Object.values(co).reduce((a,b)=>a+b,0)||1;
  const topCost=(VIEW.top_sessions||[])[0]||{};
  const topCostLabel=topCost.id ? `${topCost.id} · ${(topCost.model||'').replace('claude-','')} · ${topCost.started||''}` : '—';
  const crShare=Math.round((co.cache_read||0)/ctot*100);

  v.innerHTML = pageHead('Cost &amp; Cache','Where the dollars go, and the cache-tier economics that move them. Interactive — the cache model uses live config multipliers.','auto')+`
    <div class="kpis k4">
      <div class="kpi"><div class="top"><div class="name">Per-ask · median</div><div class="tag">rate-equiv</div></div><div class="big"><span class="cur">$</span>${money(perAskMed).replace('$','')}</div><div class="meta">median across sampled sessions</div></div>
      <div class="kpi accent"><div class="top"><div class="name">1h-cache adoption</div><div class="tag">of writes</div></div><div class="big">${oneHr}<span class="cur">%</span></div><div class="meta">already on 1h · saves ${saveP90.toFixed(0)}% at the p90 ${p90.toFixed(1)}min gap</div></div>
      <div class="kpi warn"><div class="top"><div class="name">5m expiries</div><div class="tag">ask gaps</div></div><div class="big">${n0.format(exp5)}</div><div class="meta">${n0.format(near5)} near 4–6m · ${n0.format(gapsN)} measured gaps</div></div>
      <div class="kpi warn"><div class="top"><div class="name">Cache-read share</div><div class="tag">highest-cost session</div></div><div class="big">${crShare}<span class="cur">%</span></div><div class="meta">input + output are rounding error</div></div>

    </div>
    <div class="grid">
      <div class="panel col-7"><div class="ph"><div><div class="ttl">Cache economics · 5-minute vs 1-hour</div><div class="desc">session cost as think-time between asks grows. When the 5-min window lapses, the next ask re-writes (1.25×) instead of riding a cheap read (0.10×) — that's the jump. Live corpus: ${n0.format(exp5)} measured ask gaps exceeded 5m; ${n0.format(near5)} sat on the 4–6m edge.</div></div><div class="hint">$/session · 40 asks</div></div><div class="chart" id="cc-cache" style="height:280px"></div></div>
      <div class="panel col-5"><div class="ph" style="align-items:center"><div><div class="ttl">Per-ask cost · <span id="pa-title">session</span></div><div class="desc">cost of each turn; <b style="color:var(--amber)">amber</b> = ask paid a cache write, <b style="color:var(--accent)">teal</b> = rode a cached read</div></div><select id="perask-sel" style="background:var(--panel-2);color:var(--fg);border:1px solid var(--border);border-radius:7px;padding:4px 8px;font-family:var(--mono);font-size:11px;max-width:200px"></select></div><div class="chart" id="cc-perask" style="height:264px"></div></div>
      <div class="panel col-5"><div class="ph"><div><div class="ttl">Cost composition · highest-cost session</div><div class="desc"><span class="mono">${esc(topCostLabel)}</span></div></div><div class="hint" id="cc-comp-h">—</div></div><div class="chart" id="cc-comp" style="height:170px"></div></div>
      <div class="panel col-7"><div class="ph"><div><div class="ttl">Cost by kind</div><div class="desc">notional (subscription) vs paid vs free — the money distinction</div></div><div class="hint">rate-equiv $</div></div><div class="chart" id="cc-kind" style="height:170px"></div>

    </div>`;

  // cache lines
  (function(){ const c=mk('cc-cache'); if(!c)return;

      tooltip:{...baseTooltip(),trigger:'axis',formatter:ps=>{const g=ps[0].axisValue;let s=`<b>${g} min</b> think-gap`;ps.forEach(p=>s+=`<br/>${p.marker}${p.seriesName}: ${money(p.value)}`);const a=+ps[0].value,b=+ps[1].value;s+=`<br/><span style="color:#33c9a3">save ${pct((a-b)/a,0)}</span>`;return s;}},

      yAxis:{type:'value',axisLabel:{color:fgmute(),fontFamily:"'JetBrains Mono',monospace",fontSize:10,formatter:v=>'$'+v},splitLine:{lineStyle:{color:GRID}},axisLine:{show:false},axisTick:{show:false}},
      series:[
        {name:'5-min cache',type:'line',smooth:true,symbol:'none',data:c5,lineStyle:{color:amber(),width:2.4},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(214,161,78,0.22)'},{offset:1,color:'rgba(214,161,78,0.01)'}])}},
        {name:'1-hour cache',type:'line',smooth:true,symbol:'none',data:c1h,lineStyle:{color:accent(),width:2.4},
          markLine:{silent:true,symbol:'none',lineStyle:{color:'#3a4350',type:'dashed'},label:{color:fgmute(),fontSize:9.5},data:[
            {xAxis:Math.max(1,Math.round(med)),label:{formatter:`median ${med.toFixed(1)}m`,position:'insideStartTop'}},
            {xAxis:Math.max(1,Math.min(59,Math.round(p90))),label:{formatter:`p90 ${p90.toFixed(1)}m · 1h −${saveP90.toFixed(0)}%`,position:'insideEndTop'}}
          ]}}
      ]});
  })();
  // per-ask bars — selectable session, x = turn order, colour = cache read vs write
  (function(){
    const sessions=VIEW.per_ask_sessions||[];
    const sel=document.getElementById('perask-sel'), title=document.getElementById('pa-title');
    if(!sessions.length){ const c=mk('cc-perask'); if(c)c.setOption({graphic:{type:'text',left:'center',top:'middle',style:{text:'no per-ask data',fill:fgmute(),fontSize:12}}}); if(sel)sel.style.display='none'; if(title)title.textContent='no data'; return; }
    sel.innerHTML=sessions.map((s,i)=>`<option value="${i}">${s.id} · ${s.model.replace('claude-','')} · ${money(s.cost,s.cost>=100?0:2)}</option>`).join('');

      if(chart){try{chart.dispose();}catch(e){}}

      chart.setOption({grid:{left:8,right:14,top:14,bottom:42,containLabel:true},
        tooltip:{...baseTooltip(),trigger:'axis',axisPointer:{type:'shadow'},formatter:p=>{const a=s.asks[p[0].dataIndex];return `ask <b>#${a.i}</b><br/>${money(a.cost)}<br/>gap: ${a.gap_min==null?'first ask':a.gap_min+'m'}<br/><span style="color:${a.expired_5m||a.rewrite_5m?'#d6a14e':'#33c9a3'}">${a.expired_5m?'5m cache expired':(a.rewrite_5m?'cache write':'cached read')}</span>`;}},
        xAxis:{type:'category',data:s.asks.map(a=>a.i),name:'ask # · turn order in session',nameLocation:'middle',nameGap:26,nameTextStyle:{color:fgmute(),fontSize:10.5},axisLine:{lineStyle:{color:GRID}},axisTick:{show:false},axisLabel:{color:fgmute(),fontFamily:"'JetBrains Mono',monospace",fontSize:9,interval:3}},
        yAxis:{type:'value',axisLabel:{color:fgmute(),fontFamily:"'JetBrains Mono',monospace",fontSize:10,formatter:v=>'$'+v},splitLine:{lineStyle:{color:GRID}},axisLine:{show:false},axisTick:{show:false}},
        series:[{type:'bar',data:s.asks.map(a=>({value:a.cost,itemStyle:{color:(a.expired_5m||a.rewrite_5m)?amber():accent(),borderRadius:[3,3,0,0]}})),barWidth:'62%'}]});
    }
    draw(0);

/* ---------- BEHAVIORAL ---------- */
// One glyph per detector source, reused by the attention queue.
const SOURCE_GLYPH = { runtime: '⚑', audit: '⚠', ml: 'Δ', mark: '★' };
const sourceGlyph = source => SOURCE_GLYPH[source] || '•';

// Group per-signal attention rows into one entry per session and score
// "corroboration" = how many DISTINCT detector sources independently flagged the
// session. A session three different detectors agree on outranks one flagged
// three times by the same detector — that is the signal-reinforcement we want.
//   signalRows : the flat rows gathered from runtime/audit/ml/mark detectors
//   sevOrder   : severity -> rank map (lower = worse), for picking the worst severity
//   keyOf      : canonicalises a signal to a stable per-session key (see sessionKey)
function fuseBySession(signalRows, sevOrder, keyOf){
  const bySession = new Map();
  for(const signal of signalRows){
    const key = keyOf(signal);
    const entry = bySession.get(key) || { ref: key, fleet: signal.fleet, sources: new Set(), worstSev: 'low', signals: [] };
    entry.sources.add(signal.source);
    entry.signals.push(signal);
    if(sevOrder[signal.sev] < sevOrder[entry.worstSev]) entry.worstSev = signal.sev;
    bySession.set(key, entry);
  }
  return [...bySession.values()]
    .map(entry => ({ ...entry, corroboration: entry.sources.size, sourceList: [...entry.sources] }))
    .sort((a, b) =>
      b.corroboration - a.corroboration ||              // most independent agreement first
      sevOrder[a.worstSev] - sevOrder[b.worstSev] ||     // then worst severity
      b.signals.length - a.signals.length);              // then total signal volume
}

  degTrend('b-trend');
  const MS=(VIEW.meta&&VIEW.meta.mark_summary)||{marks:(VIEW.marks||[]).length,sessions:0,days:0};
  const msh=document.getElementById('b-mark-summary'); if(msh)msh.textContent=`${MS.marks} marks · ${MS.sessions} sessions · ${MS.days} days`;
  const P=VIEW.degradation_probe||{}, A=VIEW.audit_findings||[], F=VIEW.flagged_queue||[];
  const sevRank={high:0,med:1,low:2};
  const normSev=x=>{x=String(x||'').toLowerCase(); return x==='critical'||x==='error'||x==='deg'||x==='err'?'high':(x==='warn'||x==='warning'||x==='medium'?'med':'low');};
  // Every detector now exposes the same canonical session_ref (cc:<uuid> /
  // mu:daemon:sid), so signals for one session share a join key with no per-source
  // remapping. row.ref holds that key; the Sessions page resolves it to a display
  // id via session_index.by_alias for the drill-down link. (mu per-session
  // granularity is still gated upstream by mu-jhcj, but the emit is now consistent.)
  const row = (source, sev, ref, title, detail, meta, fleet = 'mu') =>
    ({ source, sev: normSev(sev), ref: ref || '(unknown session)', title, detail, meta, fleet });
  const rows = [];
  F.forEach(x => rows.push(row('runtime', x.reason, x.session_ref, `${x.id} · ${x.model || '—'}`, x.why || '', x.reason === 'deg' ? 'degraded stop' : x.reason === 'err' ? 'tool/error loop' : x.reason === 'callout' ? 'self-flag' : 'runtime', x.fleet)));
  A.forEach(f => rows.push(row('audit', f.severity, f.session_ref, `${(f.session_ref || '').slice(0, 26)} · ${f.invariant || 'audit'}`, f.detail || '', f.severity || 'finding')));
  (P.unnoticed || []).forEach(w => rows.push(row('ml', 'med', w.session_ref, `${(w.session_ref || '').slice(0, 26)} · telemetry rosy`, `observed ${w.obs}; predicted ${w.pred}; residual ${w.resid}`, 'candidate unnoticed-degraded')));
  (P.task_frust || []).forEach(w => rows.push(row('ml', 'low', w.session_ref, `${(w.session_ref || '').slice(0, 26)} · operator warmer`, `observed ${w.obs}; predicted ${w.pred}; residual ${w.resid}`, 'telemetry pessimistic')));
  let marks = []; try { marks = JSON.parse(localStorage.getItem('mu-marks') || '[]'); } catch(e) { marks = []; }
  marks.filter(m => +m.rating && +m.rating <= 2).forEach(m => {
    const ref = m.session_ref || m.display_id || m.id || m.task_id;
    rows.push(row('mark', 'high', ref, `${ref} · ${m.rating}★ local mark`, m.note || '', 'manual low rating'));
  });

  const fused = fuseBySession(rows, sevRank, signal => signal.ref);
  const wb = document.getElementById('b-workbench'), cnt = document.getElementById('bq-count');
  const fs = document.getElementById('bq-source'), fv = document.getElementById('bq-sev'), corrToggle = document.getElementById('bq-corr');
  const sevClass = sev => sev === 'high' ? 'err' : sev === 'med' ? 'deg' : 'callout';

  function renderQueue(){
    const sourceFilter = fs.value, sevFilter = fv.value, corroboratedOnly = corrToggle.classList.contains('on');
    const matchesFilter = signal => (!sourceFilter || signal.source === sourceFilter) && (!sevFilter || signal.sev === sevFilter);
    const sessions = fused
      .filter(s => s.signals.some(matchesFilter))
      .filter(s => !corroboratedOnly || s.corroboration >= 2);
    const corroboratedTotal = fused.filter(s => s.corroboration >= 2).length;
    cnt.textContent = `${sessions.length} session${sessions.length === 1 ? '' : 's'} · ${corroboratedTotal} corroborated (2+ detectors) · ${rows.length} signals`;
    wb.innerHTML = sessions.length ? sessions.slice(0, 60).map(s => {
      const badgeColor = s.corroboration >= 3 ? 'var(--amber)' : s.corroboration >= 2 ? 'var(--blue)' : 'var(--fg-mute)';
      const badgeBg = s.corroboration >= 3 ? 'var(--amber-soft)' : 'rgba(125,147,201,0.12)';
      const chips = s.sourceList.map(src => `<span class="reason callout" style="margin-left:5px">${sourceGlyph(src)} ${src}</span>`).join('');
      const signalLines = s.signals.slice(0, 6).map(sig =>
        `<div class="qs">${sourceGlyph(sig.source)} ${esc(sig.title)}${sig.detail ? ' — ' + esc(sig.detail).slice(0, 90) : ''}</div>`).join('');
      return `<div class="qrow" style="align-items:flex-start;${rowDim(s.fleet) ? 'opacity:.35' : ''}">
        <div class="qi" title="${s.corroboration} independent detector${s.corroboration === 1 ? '' : 's'}" style="background:${badgeBg};color:${badgeColor};font-weight:700">${s.corroboration}</div>
        <div class="qmain"><div class="qt"><a class="mono" style="font-size:11px" href="${sessionHash(s.ref)}">${esc(s.ref || '(unknown)')}</a>${chips}</div>${signalLines}</div>
        <span class="reason ${sevClass(s.worstSev)}">${s.worstSev}</span><div class="qconf">${s.signals.length} signal${s.signals.length === 1 ? '' : 's'}</div>
      </div>`;
    }).join('') : `<div class="empty" style="padding:24px;color:var(--fg-mute);text-align:center">No sessions match this filter.</div>`;
  }
  fs.addEventListener('change', renderQueue);
  fv.addEventListener('change', renderQueue);
  corrToggle.addEventListener('click', () => { corrToggle.classList.toggle('on'); renderQueue(); });
  renderQueue();
  const mix={}; rows.forEach(r=>{mix[r.source]=(mix[r.source]||0)+1;});
  document.getElementById('b-signal-h').textContent=`${rows.length} total signals`;
  barH('b-signals', Object.entries(mix).map(([label,val])=>({label,val,color:label==='audit'?amber():label==='ml'?accent():label==='mark'?cssVar('--violet'):blue(),raw:true})).sort((a,b)=>a.val-b.val), 12);
  const sk=document.getElementById('b-probe-skill');
  if(sk) sk.textContent = (P.r2!=null) ? `R² ${P.r2} · MAE ${P.mae} · ${P.n_interactive||0} sessions` : 'no probe data';
  const host=document.getElementById('b-probe');
  if(host){
    const imp=(P.importances||[]).slice(0,6).map(t=>`<span class="chip">${t[0]} <b>${t[1]}</b></span>`).join(' ');
    const tbl=(rs,col)=>(rs&&rs.length)?`<table class="sess"><tbody>`+rs.slice(0,6).map(w=>`<tr class="main"><td><a class="mono" style="font-size:11px" href="${sessionHash(w.session_ref||'')}">${(w.session_ref||'').slice(0,30)}</a></td><td class="r dim">obs ${w.obs}</td><td class="r dim">pred ${w.pred}</td><td class="r" style="color:${col}">Δ${w.resid}</td></tr>`).join('')+`</tbody></table>`:`<div class="empty" style="padding:10px;color:var(--fg-mute)">none</div>`;
    host.innerHTML = `<div style="margin-bottom:10px">${imp||'<span class="dim">no importances</span>'}</div><div class="dim" style="font-size:11px;margin-bottom:3px">telemetry rosier than the operator felt</div>${tbl(P.unnoticed,'var(--amber)')}<div class="dim" style="font-size:11px;margin:10px 0 3px">operator warmer than telemetry predicts</div>${tbl(P.task_frust,'var(--accent)')}`;
  }
  const ah=document.getElementById('b-audit');
  if(ah) ah.innerHTML = A.length? A.slice(0,12).map(f=>`<div class="qrow"><div class="qi" style="background:var(--amber-soft);color:var(--amber)">⚠</div><div class="qmain"><div class="qt"><a class="mono" style="font-size:11px" href="${sessionHash(f.session_ref||'')}">${(f.session_ref||'').slice(0,26)}</a> · <span class="dim">${f.invariant}</span></div><div class="qs">${(f.detail||'').slice(0,90)}</div></div><span class="reason deg">${f.severity}</span></div>`).join('') : `<div class="empty" style="padding:24px;color:var(--fg-mute);text-align:center">no findings recorded</div>`;
}

/* shared trend builders */
function trendData(){
  if(VIEW.trend_by_day && VIEW.trend_by_day.length)
    return VIEW.trend_by_day.map(d=>({date:d.date, cost:d.cost, deg:d.degradation}));
  const start=new Date(2026,3,22),out=[];   // synthetic fallback (no real trend)
  for(let i=0;i<51;i++){ const d=new Date(start); d.setDate(d.getDate()+i);
    let cost=120+90*Math.sin(i/4.2)+70*Math.sin(i/11.0)+1.6*i;
    let deg=0.04+0.03*Math.sin(i/3.0); if(i>=24&&i<=34) deg+=0.10*Math.sin((i-24)/10.0*Math.PI);
    out.push({date:d.toISOString().slice(0,10),cost:Math.max(35,cost),deg:Math.max(0,deg)}); }
  return out;
}
function markPoints(t){ // aggregate VIEW.marks by date so same-day labels don't hide each other
  const byDate=new Map();
  (VIEW.marks||[]).forEach(m=>{ const a=byDate.get(m.date)||{date:m.date, ratings:[], notes:[], refs:[]}; a.ratings.push(+m.rating||3); if(m.note)a.notes.push(m.note); if(m.session_ref)a.refs.push(m.session_ref); byDate.set(m.date,a); });
  return [...byDate.values()].map(m=>{ const idx=t.findIndex(d=>d.date>=m.date), ti=idx<0?t.length-1:idx, avg=m.ratings.reduce((a,b)=>a+b,0)/m.ratings.length; return {idx:ti, rating:+avg.toFixed(1), count:m.ratings.length, note:m.notes.slice(0,3).join('\n---\n'), refs:m.refs, deg:t[ti].deg}; });
}

/* ======================= sessions table (interactive) ======================= */
let SS={search:'',model:'',outcome:'',flaggedOnly:false,openDays:null,open:null};
function sessionTable(initial={}){
  const host=document.getElementById('sess-days'); if(!host)return;
  const ALL=(VIEW.all_sessions&&VIEW.all_sessions.length)?VIEW.all_sessions:(VIEW.top_sessions||[]);
  const idx=(VIEW.session_index&&VIEW.session_index.by_alias)||{};
  const byId=Object.fromEntries(ALL.map(s=>[s.id,s]));
  const resolveSessionId=x=>byId[x]?x:(idx[x]||'');
  const initialOpen=resolveSessionId(initial.open||'');
  SS={search:initial.search||'',model:'',outcome:'',flaggedOnly:false,openDays:null,open:initialOpen||null};  // fresh each page entry
  const ratio=(()=>{const co=VIEW.cost_composition_top_session,t=Object.values(co).reduce((a,b)=>a+b,0);const o={};for(const k in co)o[k]=co[k]/t;return o;})();
  function compFor(s){return {input:s.cost*ratio.input,output:s.cost*ratio.output,cache_read:s.cost*ratio.cache_read,cache_write:s.cost*ratio.cache_write};}
  const whoLabel=w=>w==='u'?'user':w==='a'?'agent':'tool';
  // Each session's FULL conversation lives in its own sidecar (sessions/<slug>.json,
  // written by gen_dashboard) and is fetched on demand when the row is opened — the
  // whole point of this page is reading the entire conversation to mark the session,
  // so nothing is bounded or clipped. The page stays light; only the opened session
  // loads. Text is escaped (real tool output contains markup). 404 / no sidecar (or
  // opened over file://) → a clear empty state.
  const TXCACHE={};
  const txSlug=id=>id.replace(/·/g,'-');  // mirrors panels._slug
  function convoTurnsHtml(turns){
    if(!turns||!turns.length) return `<div class="convo-empty">No transcript captured for this session.</div>`;
    return turns.map(x=>`<div class="turn"><div class="turn-h"><span class="tchev">▶</span><span class="who ${x[0]}">${whoLabel(x[0])}</span><span class="tprev">${esc(x[1])}</span></div><div class="turn-b">${esc(x[2])}</div></div>`).join('');
  }
  function fillConvo(el,turns){ el.innerHTML=convoTurnsHtml(turns);
    el.querySelectorAll('.turn-h').forEach(h=>h.addEventListener('click',()=>h.parentElement.classList.toggle('open'))); }
  function loadConvo(el){
    const slug=el.dataset.slug;
    if(TXCACHE[slug]){ fillConvo(el,TXCACHE[slug]); return; }
    fetch('sessions/'+encodeURIComponent(slug)+'.json')
      .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(turns=>{ TXCACHE[slug]=turns; fillConvo(el,turns); })
      .catch(()=>{ el.innerHTML=`<div class="convo-empty">No transcript captured for this session.</div>`; });
  }
  function drill(s){ const co=compFor(s),tot=Object.values(co).reduce((a,b)=>a+b,0);
    const parts=[{v:co.cache_read,c:cssVar('--accent'),l:'cache read'},{v:co.output,c:cssVar('--blue'),l:'output'},{v:co.cache_write,c:cssVar('--amber'),l:'cache write'},{v:co.input,c:cssVar('--slate'),l:'input'}];
    return `<tr class="detail"><td colspan="7"><div class="drill">
      <div>
        <div class="convo-head"><h4 style="margin:0">Conversation · ${s.id}</h4>
          <div class="convo-tools"><button class="ct-btn" data-act="expand">⊕ expand all</button><button class="ct-btn" data-act="collapse">⊖ collapse all</button></div></div>
        <div class="convo" data-slug="${txSlug(s.id)}"><div class="convo-empty">Loading conversation…</div></div>
        <h4 style="margin-top:16px">Cost makeup · ${money(s.cost)}</h4>
        <div class="comp-bar" style="display:flex;height:13px;border-radius:4px;overflow:hidden;margin:4px 0 0;background:var(--panel-3);border:1px solid var(--border)">${parts.map(p=>`<i style="height:100%;width:${(p.v/tot*100).toFixed(2)}%;background:${p.c}"></i>`).join('')}</div>
      </div>
      <div>
        <h4>Session</h4>
        <div class="stat-row"><div class="stat"><span class="l">cost</span><span class="n acc">${money(s.cost)}</span></div><div class="stat"><span class="l">tool calls</span><span class="n">${n0.format(s.tool_calls)}</span></div><div class="stat"><span class="l">$ / call</span><span class="n">${money(s.cost/s.tool_calls)}</span></div></div>
        <div class="stat-row" style="margin-top:14px"><div class="stat"><span class="l">harness</span><span class="n">${fleetName(s.fleet)}</span></div><div class="stat"><span class="l">outcome</span><span class="n" style="font-size:13px;color:${oc(s.outcome)}">${s.outcome}</span></div></div>
        <div class="markbox">
          <h4>Rate this session</h4>
          <div class="stars" data-sid="${s.id}" data-ref="${s.ref||''}">${[1,2,3,4,5].map(n=>`<span class="st ${s.flagged&&n<=3?'on':''}" data-n="${n}"><svg viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9.5 17 14.5 18.5 22 12 18 5.5 22 7 14.5 2 9.5 9 9"/></svg></span>`).join('')}</div>
          <textarea placeholder="note — what you want to remember about this session…">${s.flagged?'flagged in a prior pass':''}</textarea>
          <button class="save">✓ save mark</button>
          <div class="hint">marks are sparse ground-truth — they become the ★ points on the Behavioral &amp; Overview trends.</div>
        </div>
      </div></div></td></tr>`;
  }
  const norm=q=>String(q||'').toLowerCase();
  const searchable=s=>[s.id,s.ref,s.model,s.kind,s.outcome,s.fleet].concat(s.aliases||[]).join(' ');
  function filtered(){
    const q=norm(SS.search);
    return ALL.filter(s=>
      (!SS.flaggedOnly||s.flagged) &&
      (!SS.model||s.model===SS.model) &&
      (!SS.outcome||s.outcome===SS.outcome) &&
      (!q || norm(searchable(s)).includes(q)));
  }
  function groups(){
    const by={};
    filtered().forEach(s=>{(by[s.started]=by[s.started]||[]).push(s);});
    return Object.keys(by).sort().reverse().map(day=>{
      const ss=by[day].slice().sort((a,b)=>b.cost-a.cost);
      return {day, ss, cost:ss.reduce((a,s)=>a+s.cost,0),
              mu:ss.filter(s=>s.fleet==='mu').length, cc:ss.filter(s=>s.fleet==='cc').length};
    });
  }
  function row(s){const open=SS.open===s.id;
    return `<tr class="main ${open?'open':''}" data-id="${s.id}" style="${(!open&&rowDim(s.fleet))?'opacity:.4':''}"><td style="width:22px"><span class="chev">▶</span></td>
      <td><span class="badge fleet-${s.fleet}">${fleetName(s.fleet)}</span></td>
      <td><div class="modelcell">${s.flagged?'<span class="flag" title="operator-marked">⚑</span>':''}<span class="mono" style="font-size:12px">${s.model.replace('google/','')}</span>${s.child?'<span class="subtag" title="sub-agent / branched session">sub</span>':''}</div></td>
      <td><span class="kind ${s.kind}">${s.kind}</span></td>
      <td><span class="outcome-chip"><span class="sw" style="background:${oc(s.outcome)}"></span>${s.outcome}</span></td>
      <td class="r dim">${n0.format(s.tool_calls)}</td>
      <td class="r cost-cell">${money(s.cost)}</td></tr>${open?drill(s):''}`;}
  function refreshExportCount(){ const ex=document.getElementById('export-marks'); if(!ex)return;
    const n=JSON.parse(localStorage.getItem('mu-marks')||'[]').length; ex.textContent='⭳ export marks'+(n?' ('+n+')':''); }
  function render(){
    const gs=groups();
    if(SS.openDays===null){
      const openDay=SS.open && ALL.find(s=>s.id===SS.open);
      SS.openDays=new Set(openDay?[openDay.started]:(gs.length?[gs[0].day]:[]));
    }
    const fltActive=SS.flaggedOnly||SS.model||SS.outcome||SS.search;
    document.getElementById('sess-count').textContent=
      `${n0.format(gs.reduce((a,g)=>a+g.ss.length,0))} sessions · ${gs.length} day${gs.length===1?'':'s'}`+(fltActive?' (filtered)':'');
    host.innerHTML = gs.length ? gs.map(g=>{
      const open=SS.openDays.has(g.day);
      return `<div class="day-grp ${open?'open':''}">
        <div class="day-hdr" data-day="${g.day}"><span class="chev">▶</span><span class="d">${g.day}</span><span class="dm">${g.ss.length} session${g.ss.length===1?'':'s'} · ${money(g.cost,g.cost>=100?0:2)}</span><span class="df">${g.mu?`<span class="mu">${g.mu} mu</span>`:''}${g.cc?`<span class="cc">${g.cc} cc</span>`:''}</span></div>
        <div class="day-body">${open?`<table class="sess"><tbody>${g.ss.map(row).join('')}</tbody></table>`:''}</div>
      </div>`;}).join('')
      : `<div class="empty" style="padding:26px;text-align:center;color:var(--fg-mute)">No sessions match this filter.</div>`;
    host.querySelectorAll('.day-hdr').forEach(h=>h.addEventListener('click',()=>{const d=h.dataset.day; SS.openDays.has(d)?SS.openDays.delete(d):SS.openDays.add(d); render();}));
    host.querySelectorAll('tr.main').forEach(tr=>tr.addEventListener('click',e=>{ if(e.target.closest('.markbox'))return; const id=tr.dataset.id; SS.open=SS.open===id?null:id; if(SS.open) history.replaceState(null,'',sessionHash(SS.open)); render();}));
    host.querySelectorAll('.stars').forEach(sb=>sb.querySelectorAll('.st').forEach(st=>st.addEventListener('click',()=>{const n=+st.dataset.n; sb.querySelectorAll('.st').forEach(x=>x.classList.toggle('on',+x.dataset.n<=n));})));
    host.querySelectorAll('.convo-tools .ct-btn').forEach(btn=>btn.addEventListener('click',()=>{const d=btn.closest('.drill'),op=btn.dataset.act==='expand';d.querySelectorAll('.turn').forEach(t=>t.classList.toggle('open',op));}));
    host.querySelectorAll('.markbox').forEach(mb=>{
      const sb=mb.querySelector('.stars'); if(!sb)return;
      mb.querySelector('.save').addEventListener('click',()=>{
        const btn=mb.querySelector('.save'), rating=mb.querySelectorAll('.stars .st.on').length;
        if(!rating){ btn.textContent='pick a rating ★'; return; }
        const marks=JSON.parse(localStorage.getItem('mu-marks')||'[]');
        marks.push({id:sb.dataset.sid, task_id:sb.dataset.ref||sb.dataset.sid, session_ref:sb.dataset.ref||'', display_id:sb.dataset.sid, rating, note:mb.querySelector('textarea').value, created_at_unix_ms:Date.now()});
        localStorage.setItem('mu-marks', JSON.stringify(marks));
        btn.textContent='✓ saved'; refreshExportCount();
      });
    });
    // the open session's transcript loads on demand from its sidecar (cache-first)
    if(SS.open){ const cel=host.querySelector('tr.detail .convo[data-slug]'); if(cel) loadConvo(cel); }
  }
  document.getElementById('sess-search').addEventListener('input',e=>{SS.search=e.target.value; SS.open=null; render();});
  document.getElementById('sess-model').addEventListener('change',e=>{SS.model=e.target.value; SS.open=null; render();});
  document.getElementById('sess-outcome').addEventListener('change',e=>{SS.outcome=e.target.value; SS.open=null; render();});
  const tg=document.getElementById('tg-flag'); tg.addEventListener('click',()=>{SS.flaggedOnly=!SS.flaggedOnly; tg.classList.toggle('on',SS.flaggedOnly); SS.open=null; render();});
  const exp=document.getElementById('sess-expand'); exp.addEventListener('click',()=>{const gs=groups(); const allOpen=SS.openDays&&SS.openDays.size>=gs.length&&gs.length>0; SS.openDays=new Set(allOpen?[]:gs.map(g=>g.day)); exp.textContent=allOpen?'⊕ expand all':'⊖ collapse all'; render();});
  const ex=document.getElementById('export-marks');
  if(ex) ex.addEventListener('click',()=>{
    const marks=JSON.parse(localStorage.getItem('mu-marks')||'[]');
    if(!marks.length){ ex.textContent='no local marks yet'; setTimeout(refreshExportCount,1400); return; }
    const jsonl=marks.map(m=>JSON.stringify(m)).join('\n')+'\n';
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([jsonl],{type:'application/x-ndjson'}));
    a.download='dashboard-marks-'+new Date().toISOString().slice(0,10)+'.jsonl'; a.click();
  });
  refreshExportCount();
  render();
}

/* ======================= router + shell ======================= */
const PAGES=[
  {id:'overview',title:'Overview',group:'',icon:'<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>',render:renderOverview},
  {id:'sessions',title:'Sessions',group:'explore',icon:'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/>',render:renderSessions},
  {id:'cost',title:'Cost & Cache',group:'explore',icon:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',render:renderCost},
  {id:'behavioral',title:'Behavioral',group:'monitor',icon:'<path d="M3 12h4l3 8 4-16 3 8h4"/>',render:renderBehavioral,mo:true},
  {id:'internalops',title:'Internal-ops',group:'monitor',icon:'<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/>',render:renderInternalOps,mu:true},
  {id:'delegations',title:'Delegations',group:'monitor',icon:'<circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M5 8v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/><line x1="12" y1="13" x2="12" y2="16"/>',render:renderDelegations,mu:true},
];
const STATE={page:'overview',fleet:'both'};

function buildNav(){
  const m=document.getElementById('menu'); let html=''; let lastG=null;
  PAGES.forEach(p=>{ if(p.group!==lastG){ html+=`<div class="grp">${p.group||'main'}</div>`; lastG=p.group; }
    html+=`<a href="#/${p.id}" data-id="${p.id}" ${p.stub?'class="stub-a"':''}><svg viewBox="0 0 24 24">${p.icon}</svg><span class="lbl">${p.title}</span>${p.stub?'<span class="stub">soon</span>':p.mu?'<span class="mo">mu</span>':''}</a>`;});
  m.innerHTML=html;
}
function hashState(){
  const raw=location.hash.replace('#/','')||'overview';
  const [id,qs='']=raw.split('?');
  return {id, params:new URLSearchParams(qs)};
}
function sessionHash(id){ return '#/sessions?open='+encodeURIComponent(id); }
function route(){
  const hs=hashState(); let id=hs.id; const p=PAGES.find(x=>x.id===id&&!x.stub);
  if(!p){ location.hash='#/overview'; return; }
  STATE.page=id;
  VIEW = scopedData(STATE.fleet);   // scope the whole contract to the selected fleet
  document.querySelectorAll('#menu a').forEach(a=>a.classList.toggle('on',a.dataset.id===id));
  document.getElementById('pg-name').textContent=p.title;
  disposeCharts();
  const v=document.getElementById('view'); v.scrollTop=0;
  p.render(v, hs.params);
}
function init(){
  buildNav();
  document.getElementById('side-asof').textContent=new Date(VIEW.as_of).toLocaleString('en-US',{month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
  // watermark only when the loaded dataset is synthetic (MU_ANALYTICS_DEMO); real data shows none.
  if((VIEW.note||'').toUpperCase().includes('SYNTHETIC')) document.getElementById('demo-rib').style.display='';
  document.getElementById('collapse').addEventListener('click',()=>{document.body.classList.toggle('collapsed');setTimeout(()=>CHARTS.forEach(c=>{try{c.resize();}catch(e){}}),200);});
  document.querySelectorAll('#fleet button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#fleet button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    STATE.fleet=b.dataset.fleet; route();
  }));
  window.addEventListener('hashchange',route);
  window.addEventListener('resize',()=>CHARTS.forEach(c=>{try{c.resize();}catch(e){}}));
  if(!location.hash) location.hash='#/overview'; else route();
}
init();
</script>
