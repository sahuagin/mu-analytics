name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Mirrors `just ci` (ruff format + lint, ty, unittest) + the verify-claims gate.
# config.toml is gitignored; the modules fall back to config.example.toml, and the
# tests are hermetic (synthetic event-log fixtures), so no real data is needed.
jobs:
  lint:
    name: ruff (format + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff format --check .
      - run: ruff check .

  typecheck:
    name: ty check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ty duckdb
      - run: ty check

  test:
    name: unittest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install duckdb
      - run: python -m unittest discover -s tests -v

  verify-claims:
    name: verify-claims (per-commit)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Run verify-claims over PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -u
          commits=$(git rev-list --reverse --no-merges "${BASE_SHA}..${HEAD_SHA}")
          if [ -z "$commits" ]; then
            echo "verify-claims: no non-merge commits in range"; exit 0
          fi
          rc=0
          for c in $commits; do scripts/verify-claims.sh "$c" || rc=$?; done
          exit "$rc"
